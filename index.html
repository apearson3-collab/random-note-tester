<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>note and interval generator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id = "mainArea">
            <span id = "input">
                <button id="noteButton">genrate note</button>
                <button id="intervalButton">genrate number</button>
                <input type="text" id="inputText">
            </span>
            <span id = "output">
                <p id="noteText">the current note is: </p>
                <p id="intervalText">the current interval is: </p>
                <button id="submitButton">check Answer</button>
            </span>
        </div>
        <p id="isCorrect"></p>
        <script src="script.js"></script>
    </body>
</html>

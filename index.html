<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>note and interval generator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id = "mainArea">
            <button id = "noteButton">genrate note</button>
            <p id = "noteText">the current note is: </p>
            <button id = "intervalButton">genrate number</button>
            <p id = "intervalText">the current interval is: </p>
            <input type = "text" id = "inputText" maxlength = "2">
            <button id = "submitButton">check Answer</button>
            <p id = "isCorrect">that is __</p>
            <button id = "resetButton">reset</button>
            <button id = "showAnswer">reveal answer</button>
            <p id = "seeAnswer"></p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
